---
layout: default
---
<article class="page">
  <header class="page-header">
    <div class="wrap narrow">
      {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
    </div>
  </header>

  <div class="wrap narrow page-body">
    {{ content }}
  </div>
</article>
